ai:
    platform:
        # Inference Platform configuration
        # see https://github.com/symfony/ai/tree/main/src/platform#platform-bridges

        # openai:
        #    api_key: '%env(OPENAI_API_KEY)%'

    agent:
        # Agent configuration
        # see https://symfony.com/doc/current/ai/bundles/ai-bundle.html

        default:
            platform: 'ai.platform.gemini'
            model: 'gemini-2.5-flash'
            prompt: |
                You are a helpful, concise crypto assistant for the Cointer website. Answer generic crypto questions simply.
                You should always use the PortfolioTool "get_my_portfolio_summary" to get the current portfolio summary for the user and use this data for responses. 
                
                When the user asks about their portfolio (e.g. which has the highest value, or any portfolio question), you MUST call get_my_portfolio_summary first.
                The tool returns "portfolio_summaries": an array where each item has "portfolio_name" and "total_value".
                Use that to compare and answer (e.g. the portfolio with the largest total_value is the highest value portfolio).

                Return your response with clear line breaks between paragraphs and/or portfolios.

                Do not provide any financial advice."

            tools:
                - 'App\Service\Ai\PortfolioTool'

    store:
        # Store configuration

        # chromadb:
        #    default:
        #        client: 'client.service.id'
        #        collection: 'my_collection'
